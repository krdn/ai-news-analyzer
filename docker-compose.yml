services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: celeb_user
      POSTGRES_PASSWORD: celeb_pass
      POSTGRES_DB: celeb_news
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6382:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3200:3000"
    environment:
      DATABASE_URL: postgresql://celeb_user:celeb_pass@postgres:5432/celeb_news
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://celeb_user:celeb_pass@postgres:5432/celeb_news
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
